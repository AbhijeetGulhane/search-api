apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape search-api pods via K8s service discovery
      - job_name: 'search-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-sre
        relabel_configs:
          # Only scrape pods with label app=search-api
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: search-api
          # Use port 8000 (the container port)
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__
          # Add pod name as a label on every metric
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          # Add namespace as a label
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
